services:
  - type: web
    name: multichat-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: multichat-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: multichat-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: multichat-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: multichat-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: multichat-db
          property: password

databases:
  - name: multichat-db
    plan: free
